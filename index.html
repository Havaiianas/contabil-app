<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agility ConcilIA</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@1&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────── */
:root {
  --bg: #FAF8F3;
  --sf: #FFFFFF;
  --sf2: #F2EFE7;
  --bd: #E4E0D6;
  --bd2: #EAE6DC;
  --ink: #0F1020;
  --ink2: #2E3050;
  --ink3: #6B6E8A;
  --ink4: #9FA2BC;
  --primary: #4C4EF5;
  --primary-dark: #3A3CE0;
  --primary-bg: #EEEEFF;
  --lime: #E6FF4C;
  --ok: #16A34A;
  --ok-bg: #DCFCE7;
  --ok-bd: #86EFAC;
  --wn: #D97706;
  --wn-bg: #FEF3C7;
  --wn-bd: #FCD34D;
  --rk: #DC2626;
  --rk-bg: #FEE2E2;
  --rk-bd: #FCA5A5;
  --sidebar: #0F1020;
  --sidebar-w: 220px;
  --topbar-h: 48px;
  --mobile-tab-h: 60px;
  --r: 8px;
  --rl: 12px;
  --sh: 0 1px 3px rgba(15,16,32,.06), 0 3px 12px rgba(15,16,32,.04);
}

/* ── RESET ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Geist', sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--ink);
  background: var(--bg);
  overflow: hidden;
  height: 100dvh;
  width: 100%;
}
#root { width: 100%; height: 100dvh; }

/* ── LAYOUT ──────────────────────────────────── */
.app {
  display: flex;
  width: 100%;
  height: 100dvh;
  overflow: hidden;
}
.app-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100dvh;
}
.page-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.page {
  padding: 28px 32px;
  max-width: 1280px;
  width: 100%;
}

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  height: 100dvh;
  background: var(--sidebar);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}
.sb-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sb-logo-text { font-size: 14px; font-weight: 700; letter-spacing: -.03em; color: #fff; }
.sb-logo-ia { color: var(--primary); }
.sb-logo-sub { font-size: 9px; color: rgba(255,255,255,.25); text-transform: uppercase; letter-spacing: .1em; margin-top: 1px; }
.sb-eng {
  padding: 12px 16px;
  background: rgba(255,255,255,.03);
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.sb-eng-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.2); margin-bottom: 5px; }
.sb-eng-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.85); line-height: 1.35; }
.sb-eng-cnpj { font-size: 10px; color: rgba(255,255,255,.3); font-family: 'Geist Mono', monospace; margin-top: 2px; }
.sb-section { padding: 14px 12px 4px; }
.sb-sec-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.18); padding: 0 6px; margin-bottom: 4px; }
.sb-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 8px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 500;
  color: rgba(255,255,255,.45);
  transition: all .12s;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  position: relative;
}
.sb-item:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.8); }
.sb-item.on {
  background: rgba(76,78,245,.2);
  color: #fff;
  border-left: 2px solid var(--primary);
  padding-left: 6px;
}
.sb-badge {
  margin-left: auto;
  font-size: 9px;
  font-weight: 700;
  background: var(--rk);
  color: #fff;
  padding: 1px 6px;
  border-radius: 100px;
}
.sb-badge.ok { background: var(--primary); }
.sb-bottom {
  margin-top: auto;
  padding: 12px 12px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.sb-user {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 7px;
  cursor: pointer;
  transition: background .12s;
}
.sb-user:hover { background: rgba(255,255,255,.06); }
.sb-av {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

/* ── TOPBAR ─────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  background: var(--sf);
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 24px;
  flex-shrink: 0;
}
.tb-bc { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink3); }
.tb-bc-cur { color: var(--ink); font-weight: 500; }
.tb-search {
  flex: 1;
  max-width: 320px;
  margin: 0 auto;
}
.tb-si {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 6px 12px;
}
.tb-inp { border: none; background: transparent; font-size: 12px; color: var(--ink); outline: none; width: 100%; font-family: inherit; }
.tb-kbd { font-size: 10px; color: var(--ink4); background: var(--bd2); padding: 1px 5px; border-radius: 4px; font-family: 'Geist Mono', monospace; white-space: nowrap; }
.tb-acts { display: flex; align-items: center; gap: 6px; margin-left: auto; }

/* ── MOBILE HEADER ───────────────────────────── */
.m-header {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--sf);
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
  height: 52px;
}
.m-header-title { font-size: 15px; font-weight: 600; letter-spacing: -.03em; flex: 1; }

/* ── MOBILE TABS ─────────────────────────────── */
.m-tabs {
  display: none;
  justify-content: space-around;
  align-items: center;
  padding: 6px 0 env(safe-area-inset-bottom, 8px);
  background: var(--sf);
  border-top: 1px solid var(--bd);
  flex-shrink: 0;
  min-height: var(--mobile-tab-h);
}
.m-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 4px 12px;
  font-size: 9px;
  font-weight: 600;
  color: var(--ink3);
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: .04em;
  min-width: 48px;
}
.m-tab.on { color: var(--primary); }

/* ── CARDS ───────────────────────────────────── */
.card { background: var(--sf); border: 1px solid var(--bd); border-radius: var(--rl); overflow: hidden; box-shadow: var(--sh); }
.ch { padding: 13px 18px; border-bottom: 1px solid var(--bd2); display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.ct { font-size: 12.5px; font-weight: 600; }
.cb { padding: 18px; }

/* ── STATS ───────────────────────────────────── */
.sg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.stat { background: var(--sf); border: 1px solid var(--bd); border-radius: var(--rl); padding: 18px; box-shadow: var(--sh); }
.stat-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--ink3); }
.stat-val { font-size: 28px; font-weight: 700; letter-spacing: -.04em; margin-top: 6px; line-height: 1; font-variant-numeric: tabular-nums; }
.stat-sub { font-size: 11px; color: var(--ink3); margin-top: 5px; }

/* ── TABLE ───────────────────────────────────── */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tbl { width: 100%; border-collapse: collapse; min-width: 500px; }
.tbl th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--ink3); padding: 9px 14px; text-align: left; border-bottom: 1px solid var(--bd2); background: var(--sf2); white-space: nowrap; }
.tbl td { padding: 10px 14px; border-bottom: 1px solid var(--bd2); font-size: 12.5px; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--sf2); }
.mono { font-family: 'Geist Mono', monospace; font-variant-numeric: tabular-nums; }

/* ── BADGES ─────────────────────────────────── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; border: 1px solid; white-space: nowrap; }
.bok { background: var(--ok-bg); color: var(--ok); border-color: var(--ok-bd); }
.bwn { background: var(--wn-bg); color: var(--wn); border-color: var(--wn-bd); }
.brk { background: var(--rk-bg); color: var(--rk); border-color: var(--rk-bd); }
.bin { background: var(--primary-bg); color: var(--primary); border-color: rgba(76,78,245,.3); }
.bgray { background: var(--sf2); color: var(--ink3); border-color: var(--bd); }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.dok { background: var(--ok); }
.dwn { background: var(--wn); }
.drk { background: var(--rk); }
.din { background: var(--primary); }

/* ── BUTTONS ─────────────────────────────────── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 14px; border-radius: var(--r); border: 1px solid var(--bd); background: var(--sf); color: var(--ink); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .12s; white-space: nowrap; }
.btn:hover { background: var(--sf2); }
.btn.pr { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn.pr:hover { background: var(--primary-dark); }
.btn.sm { padding: 5px 10px; font-size: 11px; }
.btn.gh { background: transparent; border-color: transparent; padding: 7px 8px; }
.btn.gh:hover { background: var(--sf2); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn.icon { padding: 7px; }

/* ── INPUT ───────────────────────────────────── */
.inp { width: 100%; padding: 9px 12px; border: 1px solid var(--bd); border-radius: var(--r); background: var(--sf); font-size: 13px; color: var(--ink); font-family: inherit; outline: none; transition: border .12s; }
.inp:focus { border-color: var(--primary); }

/* ── PAGE HEADER ────────────────────────────── */
.ph { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 10px; }
.pt { font-size: 22px; font-weight: 700; letter-spacing: -.04em; line-height: 1.1; }
.ps { font-size: 12px; color: var(--ink3); margin-top: 3px; }

/* ── GRID ────────────────────────────────────── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* ── PROGRESS ────────────────────────────────── */
.pbar { height: 5px; background: var(--bd); border-radius: 100px; overflow: hidden; }
.pbar-f { height: 100%; border-radius: 100px; transition: width .5s; }

/* ── CHAT ────────────────────────────────────── */
.chat-wrap { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
.mrow { display: flex; gap: 9px; align-items: flex-start; }
.mrow.me { flex-direction: row-reverse; }
.bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; max-width: min(600px, 80vw); white-space: pre-wrap; }
.bubble.ai { background: var(--sf); border: 1px solid var(--bd); border-bottom-left-radius: 3px; }
.bubble.me { background: var(--primary); color: #fff; border-bottom-right-radius: 3px; }
.agav { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.pulse { width: 4px; height: 4px; border-radius: 50%; background: var(--ink3); animation: pulse .9s ease-in-out infinite; }
.pulse:nth-child(2) { animation-delay: .15s; }
.pulse:nth-child(3) { animation-delay: .3s; }
.chat-bar { padding: 12px 16px 14px; border-top: 1px solid var(--bd); background: var(--sf); display: flex; gap: 8px; flex-shrink: 0; }

/* ── LOG ─────────────────────────────────────── */
.log-line { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04); display: flex; gap: 12px; font-family: 'Geist Mono', monospace; font-size: 11.5px; line-height: 1.5; }
.l-ts { color: #444; flex-shrink: 0; }
.l-ok { color: #6fcf97; }
.l-warn { color: #f0a500; }
.l-critico { color: #ff6b6b; font-weight: 600; }
.l-info { color: #888; }

/* ── LOGIN ───────────────────────────────────── */
.login-pg { display: flex; width: 100%; height: 100dvh; overflow-y: auto; }
.login-l { flex: 1; background: var(--primary); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 48px; }
.login-r { width: 460px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 48px 40px; background: var(--bg); }
.lform { width: 100%; max-width: 340px; }
.llbl { font-size: 11px; font-weight: 600; color: var(--ink2); margin-bottom: 5px; display: block; }
.lerr { background: var(--rk-bg); border: 1px solid var(--rk-bd); border-radius: var(--r); padding: 9px 13px; font-size: 12px; color: var(--rk); margin-bottom: 12px; }

/* ── SPINNER ─────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: .4; } 50% { transform: scale(1.5); opacity: 1; } }
@keyframes fup { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.spin { width: 16px; height: 16px; border: 2px solid var(--bd); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; flex-shrink: 0; }
.fup { animation: fup .2s ease both; }

/* ── INDICIO CARD ────────────────────────────── */
.indicio { padding: 12px 14px; border-left: 3px solid; background: var(--sf); margin-bottom: 8px; border-radius: 0 var(--r) var(--r) 0; border-top: 1px solid var(--bd); border-right: 1px solid var(--bd); border-bottom: 1px solid var(--bd); }

/* ── LIME ────────────────────────────────────── */
.lime-stat { background: var(--lime); border: 1px solid rgba(0,0,0,.08); }
.lime-tag { background: var(--lime); color: var(--ink); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; font-family: 'Geist Mono', monospace; }

/* ── BENFORD ─────────────────────────────────── */
.benford { display: flex; align-items: flex-end; gap: 4px; height: 80px; }
.bf-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 3px; }
.bf-bars { display: flex; align-items: flex-end; gap: 1px; height: 65px; }
.bf-b { border-radius: 2px 2px 0 0; min-width: 7px; }
.bf-lbl { font-size: 9px; }

/* ── DROPZONE ────────────────────────────────── */
.dz { border: 2px dashed var(--bd); border-radius: var(--rl); padding: 36px 24px; text-align: center; cursor: pointer; transition: all .15s; }
.dz:hover, .dz.drag { border-color: var(--primary); background: var(--primary-bg); }

/* ── RESPONSIVE ──────────────────────────────── */
@media (min-width: 769px) {
  .m-header { display: none !important; }
  .m-tabs { display: none !important; }
}

@media (max-width: 768px) {
  .sidebar { display: none !important; }
  .topbar { display: none !important; }
  .m-header { display: flex !important; }
  .m-tabs { display: flex !important; }

  .page { padding: 16px 14px; }
  .sg { grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat { padding: 14px 12px; }
  .stat-val { font-size: 20px !important; }
  .pt { font-size: 17px; }
  .ps { font-size: 11px; }
  .ph { margin-bottom: 14px; }
  .ph .btn { font-size: 11px; padding: 6px 10px; }

  .g2 { grid-template-columns: 1fr !important; }
  .g3 { grid-template-columns: 1fr 1fr !important; }

  .chat-msgs { padding: 14px; }
  .chat-bar { padding: 10px 12px 12px; }
  .bubble { max-width: 85vw; font-size: 12px; }

  .login-l { display: none !important; }
  .login-r { width: 100% !important; padding: 32px 20px !important; }

  .tbl { min-width: 480px; }
  .cb { padding: 14px; }
  .ch { padding: 11px 14px; }
  .card { border-radius: 10px; }

  .benford { height: 60px; }
  .bf-bars { height: 48px; }
}

@media (max-width: 480px) {
  .sg { grid-template-columns: 1fr !important; }
  .g3 { grid-template-columns: 1fr !important; }
  .page { padding: 12px; }
}

/* ── SCORE SVG FIX ───────────────────────────── */
.score-wrap { display: flex; align-items: center; gap: 14px; }
@media (max-width: 400px) {
  .score-wrap { flex-direction: column; align-items: flex-start; gap: 8px; }
}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const API = 'https://187.127.251.194.nip.io';
const { useState, useEffect, useRef } = React;

const api = {
  token: localStorage.getItem('ct'),
  async r(m, p, b) {
    const h = { 'Content-Type': 'application/json' };
    if (this.token) h['Authorization'] = `Bearer ${this.token}`;
    const res = await fetch(API + p, { method: m, headers: h, body: b ? JSON.stringify(b) : undefined });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error || 'Erro');
    return d;
  },
  get: p => api.r('GET', p),
  post: (p, b) => api.r('POST', p, b),
  patch: (p, b) => api.r('PATCH', p, b),
  put: (p, b) => api.r('PUT', p, b),
  del: p => api.r('DELETE', p),
};

const BRL = n => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0 }).format(n || 0);
const BRLk = n => n >= 1000000 ? `R$ ${(n / 1000000).toFixed(1)}M` : n >= 1000 ? `R$ ${(n / 1000).toFixed(0)}k` : BRL(n);
const Spin = () => <div className="spin" />;

/* ── LOGO ──────────────────────────────────── */
const LogoA = ({ size = 32, light = false }) => (
  <svg width={size} height={size} viewBox="0 0 100 100" fill="none" style={{ flexShrink: 0 }}>
    <path d="M10 92 L50 8 L90 92" stroke={light ? '#fff' : '#0F1020'} strokeWidth="10" strokeLinecap="round" strokeLinejoin="round" />
    <line x1="26" y1="62" x2="74" y2="62" stroke="#4C4EF5" strokeWidth="9" strokeLinecap="round" />
    <circle cx="74" cy="62" r="5.5" fill="#E6FF4C" />
  </svg>
);

const LogoFull = ({ light = false }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
    <LogoA size={28} light={light} />
    <div style={{ lineHeight: 1.15 }}>
      <div style={{ fontSize: 13.5, fontWeight: 700, letterSpacing: '-.03em', color: light ? '#fff' : 'var(--ink)' }}>
        Agility <span style={{ color: '#4C4EF5' }}>Concil</span><span style={{ color: '#4C4EF5' }}>IA</span>
      </div>
    </div>
  </div>
);

/* ── ICONS ─────────────────────────────────── */
const Ico = ({ ch, size = 14, stroke = 1.7, style }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, ...style }}>
    {ch}
  </svg>
);
const I = {
  overview: s => <Ico size={s} ch={<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>}/>,

/* ── SCORE RING ────────────────────────────── */
const ScoreRing = ({ score = 78, size = 88 }) => {
  const stroke = 8, r = (size - stroke) / 2, c = 2 * Math.PI * r, dash = (score / 100) * c;
  const color = score >= 80 ? 'var(--primary)' : score >= 60 ? 'var(--wn)' : 'var(--rk)';
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--bd)" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${c}`} strokeLinecap="round"
        transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: 'stroke-dasharray .6s' }} />
      <text x={size / 2} y={size / 2 - 1} textAnchor="middle" dominantBaseline="central"
        style={{ fontSize: size * .24, fontWeight: 700, fill: 'var(--ink)', fontFamily: 'Geist' }}>{score}</text>
      <text x={size / 2} y={size / 2 + size * .17} textAnchor="middle" dominantBaseline="central"
        style={{ fontSize: size * .09, fill: 'var(--ink3)', fontFamily: 'Geist', fontWeight: 500, letterSpacing: '0.04em' }}>SCORE</text>
    </svg>
  );
};

/* ── BENFORD ───────────────────────────────── */
const Benford = ({ data }) => {
  if (!data?.length) return null;
  const max = Math.max(...data.map(d => Math.max(d.esperado, d.observado)));
  return (
    <div className="benford">
      {data.map(d => {
        const hE = (d.esperado / max) * 58, hO = (d.observado / max) * 58;
        const anomaly = d.observado > d.esperado * 1.3;
        return (
          <div key={d.digito} className="bf-col">
            <div className="bf-bars">
              <div className="bf-b" style={{ width: 8, height: hE, background: 'var(--bd)' }} />
              <div className="bf-b" style={{ width: 8, height: hO, background: anomaly ? 'var(--rk)' : 'var(--ok)', opacity: .8 }} />
            </div>
            <div className="bf-lbl" style={{ color: anomaly ? 'var(--rk)' : 'var(--ink4)', fontWeight: anomaly ? 700 : 400 }}>{d.digito}</div>
          </div>
        );
      })}
    </div>
  );
};

    <div className="page fup">

      <div className="g3" style={{ marginBottom: 20 }}>
        {[{ l: 'Conformes', v: data?.conforme, c: 'var(--ok)' }, { l: 'Parciais', v: data?.parcial, c: 'var(--wn)' }, { l: 'Não conformes', v: data?.nao_conforme, c: 'var(--rk)' }].map(s => (
          <div key={s.l} className="stat"><div className="stat-lbl">{s.l}</div><div className="stat-val" style={{ color: s.c }}>{s.v}</div></div>
        ))}
      </div>
      {cats.map(cat => (
        <div key={cat} className="card" style={{ marginBottom: 14 }}>
          <div className="ch"><div className="ct">{cat}</div></div>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead><tr><th>Item</th><th>Status</th><th>Achados</th><th>Risco</th></tr></thead>
              <tbody>
                {(data?.matriz || []).filter(m => m.categoria === cat).map(m => (
                  <tr key={m.id}>
                    <td style={{ fontWeight: 500 }}>{m.item}</td>
                    <td><span className={`badge ${sb[m.status]}`}><span className="dot" style={{ background: sc[m.status] }} />{sl[m.status]}</span></td>
                    <td style={{ textAlign: 'center', color: m.achados > 0 ? 'var(--rk)' : 'var(--ink3)', fontWeight: m.achados > 0 ? 600 : 400 }}>{m.achados > 0 ? m.achados : '—'}</td>
                    <td><span className={`badge ${m.risco === 'critico' ? 'brk' : m.risco === 'alto' ? 'bwn' : m.risco === 'medio' ? 'bwn' : 'bok'}`}>{m.risco}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
};

/* ── EXEC ──────────────────────────────────── */
const Exec = () => {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => { api.get('/api/audit/execution').then(d => setLogs(d.logs || [])).catch(console.error).finally(() => setLoading(false)); }, []);
  return (
    <div className="page fup">
      <div className="ph"><div><div className="pt">Execução do agente</div><div className="ps">Log detalhado da última análise</div></div></div>
      <div className="card">
        <div className="ch"><div className="ct">✦ Log · {new Date().toLocaleDateString('pt-BR')}</div><span className="badge bok"><span className="dot dok" />Concluído</span></div>
        <div style={{ padding: '14px 18px', background: '#0A0A0F', borderRadius: '0 0 var(--rl) var(--rl)', overflowX: 'auto' }}>
          {loading ? <div style={{ color: '#555', padding: 16 }}>Carregando...</div> : logs.map((l, i) => (
            <div key={i} className="log-line">
              <span className="l-ts">{l.ts}</span>
              <span style={{ color: '#555' }}>·</span>
              <span className={`l-${l.tipo}`}>{l.msg}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ── FONTES ────────────────────────────────── */
const Fontes = ({ screen }) => {
  const [docs, setDocs] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [drag, setDrag] = useState(false);
  const ref = useRef();
  const titles = { extratos: 'Extratos bancários', uploads: 'Uploads', notas: 'Notas fiscais', contratos: 'Contratos', qsa: 'QSA / Receita' };
  useEffect(() => { api.get('/api/upload').then(d => setDocs(d.documents || [])).catch(console.error); }, []);
  const doUpload = async files => {
    setUploading(true);
    const form = new FormData();
    Array.from(files).forEach(f => form.append('files', f));
    try {
      const res = await fetch(API + '/api/upload', { method: 'POST', headers: { Authorization: `Bearer ${api.token}` }, body: form });
      const d = await res.json(); if (!res.ok) throw new Error(d.error);
      const r = await api.get('/api/upload'); setDocs(r.documents || []);
    } catch (e) { alert('Erro: ' + e.message); } finally { setUploading(false); }
  };
  return (
    <div className="page fup">
      <div className="ph"><div><div className="pt">{titles[screen] || 'Fontes'}</div><div className="ps">Documentos indexados para análise</div></div></div>
      <div className="g2">
        <div>
          <div className={`dz ${drag ? 'drag' : ''}`} onClick={() => ref.current?.click()}
            onDragOver={e => { e.preventDefault(); setDrag(true); }} onDragLeave={() => setDrag(false)}
            onDrop={e => { e.preventDefault(); setDrag(false); doUpload(e.dataTransfer.files); }}>
            <div style={{ width: 48, height: 48, borderRadius: 12, background: 'var(--sf2)', border: '1px solid var(--bd)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
              {uploading ? <Spin /> : I.upload(22)}
            </div>
            <div style={{ fontWeight: 600, fontSize: 14 }}>{uploading ? 'Enviando...' : 'Adicionar documentos'}</div>
            <div style={{ fontSize: 11, color: 'var(--ink3)', marginTop: 4 }}>OFX, XML NF-e, PDF, CSV</div>
            <button className="btn pr" style={{ marginTop: 16 }} onClick={e => { e.stopPropagation(); ref.current?.click(); }}>{I.upload(13)}Selecionar</button>
            <input ref={ref} type="file" multiple accept=".pdf,.ofx,.xml,.jpg,.png,.csv" style={{ display: 'none' }} onChange={e => doUpload(e.target.files)} />
          </div>
        </div>
        <div className="card">
          <div className="ch"><div className="ct">Arquivos ({docs.length})</div></div>
          <div style={{ overflowY: 'auto', maxHeight: 400 }}>
            {docs.length === 0 ? <div style={{ padding: 40, textAlign: 'center', color: 'var(--ink3)', fontSize: 13 }}>Nenhum arquivo ainda</div> :
              docs.map(d => (
                <div key={d.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderBottom: '1px solid var(--bd2)' }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 500, fontSize: 12, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{d.filename}</div>
                    <div className="mono" style={{ fontSize: 10, color: 'var(--ink3)', marginTop: 2 }}>{(d.size / 1024).toFixed(0)} KB · {d.type}</div>
                  </div>
                  <span className={`badge ${d.status === 'done' ? 'bok' : d.status === 'error' ? 'brk' : 'bwn'}`}>{d.status === 'done' ? 'Lido' : d.status === 'error' ? 'Erro' : 'Processando'}</span>
                </div>
              ))}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── LAUDO ─────────────────────────────────── */
const Laudo = () => {
  const [data, setData] = useState(null);
  const [gen, setGen] = useState(false);
  useEffect(() => { api.get('/api/audit/overview').then(setData).catch(console.error); }, []);
  const eng = data?.engagement;
  return (
    <div className="page fup">
      <div className="ph">
        <div><div className="pt">Laudo de auditoria</div><div className="ps">Documento formal de evidências e achados</div></div>
        <button className="btn pr" onClick={() => { setGen(true); setTimeout(() => { setGen(false); alert('Laudo gerado! Em produção, o PDF seria baixado.'); }, 2500); }} disabled={gen}>
          {gen ? <><Spin />Gerando...</> : <>{I.dl(13)}Gerar laudo PDF</>}
        </button>
      </div>
      <div className="g2">
        <div className="card">
          <div className="ch"><div className="ct">Dados do engajamento</div></div>
          <div className="cb">
            {[['Empresa', eng?.empresa || '—'], ['CNPJ', eng?.cnpj || '—'], ['Engajamento', eng?.code || '—'], ['Período', eng ? `${eng.periodo_inicio} → ${eng.periodo_fim}` : '—'], ['Score', `${data?.score || 78}/100`], ['Achados', `${data?.achados_total || 0} (${data?.indicios_fraude || 0} fraudes)`], ['Exposição', BRL(data?.exposicao_financeira)]].map(([l, v]) => (
              <div key={l} style={{ display: 'flex', justifyContent: 'space-between', padding: '9px 0', borderBottom: '1px solid var(--bd2)', fontSize: 13, gap: 12 }}>
                <span style={{ color: 'var(--ink3)', flexShrink: 0 }}>{l}</span>
                <span style={{ fontWeight: 500, textAlign: 'right' }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="ch"><div className="ct">Estrutura do laudo</div></div>
          <div className="cb">
            {[['1.', 'Sumário executivo', 'Visão geral e conclusões'], ['2.', 'Escopo e metodologia', 'Fontes e técnicas utilizadas'], ['3.', 'Achados e evidências', `${data?.achados_total || 0} achados detalhados`], ['4.', 'Análise estatística', 'Lei de Benford e padrões'], ['5.', 'Partes relacionadas', 'QSA e conflitos de interesse'], ['6.', 'Matriz de conformidade', 'Avaliação de controles'], ['7.', 'Recomendações', 'Ações corretivas prioritárias'], ['8.', 'Anexos', 'Planilhas e documentos']].map(([n, t, s]) => (
              <div key={t} style={{ display: 'flex', gap: 10, padding: '8px 0', borderBottom: '1px solid var(--bd2)' }}>
                <span className="mono" style={{ fontWeight: 700, color: 'var(--ink3)', fontSize: 11, minWidth: 20, flexShrink: 0 }}>{n}</span>
                <div><div style={{ fontWeight: 500, fontSize: 12 }}>{t}</div><div style={{ fontSize: 11, color: 'var(--ink3)', marginTop: 1 }}>{s}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── FORENSE ───────────────────────────────── */
const Forense = () => {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const ref = useRef();
  useEffect(() => { ref.current && (ref.current.scrollTop = ref.current.scrollHeight); }, [msgs]);
  const send = async text => {
    const m = text || input.trim(); if (!m || sending) return;
    setInput(''); setSending(true);
    setMsgs(p => [...p, { id: Date.now(), role: 'user', content: m }]);
    try { const d = await api.post('/api/audit/forense', { message: m }); setMsgs(p => [...p, d.message]); }
    catch (e) { setMsgs(p => [...p, { id: Date.now() + 1, role: 'assistant', content: 'Erro: ' + e.message }]); }
    finally { setSending(false); }
  };
  const suggs = ['Resumo do engajamento', 'Detalhe o achado F-001', 'Análise de Benford', 'Qual a exposição total?'];
  return (
    <div className="chat-wrap">
      <div style={{ padding: '14px 20px 0', borderBottom: '1px solid var(--bd)', background: 'var(--sf)', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingBottom: 12 }}>
          <div className="agav" style={{ width: 36, height: 36, fontSize: 11 }}>AI</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, letterSpacing: '-.03em' }}>Assistente Forense</div>
            <div style={{ fontSize: 11, color: 'var(--ok)', fontWeight: 500, display: 'flex', alignItems: 'center', gap: 5, marginTop: 1 }}>
              <span className="dot dok" style={{ width: 5, height: 5 }} />online · acesso a todos os achados
            </div>
          </div>
          <button className="btn sm gh" style={{ marginLeft: 'auto' }} onClick={() => setMsgs([])}>{I.x(12)}Limpar</button>
        </div>
      </div>
      <div ref={ref} className="chat-msgs">
        {msgs.length === 0 && (
          <div style={{ textAlign: 'center', padding: '40px 16px', color: 'var(--ink3)' }}>
            <div style={{ fontSize: 32, marginBottom: 10 }}>🔍</div>
            <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--ink)', marginBottom: 6 }}>Assistente Forense Contábil</div>
            <div style={{ fontSize: 12, lineHeight: 1.65 }}>Acesso completo a achados, documentos e análises.<br />Investigue qualquer transação suspeita.</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, justifyContent: 'center', marginTop: 18 }}>
              {suggs.map(s => <button key={s} className="btn sm" onClick={() => send(s)}>{s}</button>)}
            </div>
          </div>
        )}
        {msgs.map((m, i) => (
          <div key={m.id || i} className="fup" style={{ display: 'flex', flexDirection: 'column', alignItems: m.role === 'user' ? 'flex-end' : 'flex-start', gap: 6 }}>
            <div className={`mrow ${m.role === 'user' ? 'me' : ''}`}>
              {m.role === 'assistant' && <div className="agav" style={{ width: 26, height: 26, fontSize: 9, flexShrink: 0 }}>AI</div>}
              <div className={`bubble ${m.role === 'user' ? 'me' : 'ai'}`}>{m.content}</div>
            </div>
          </div>
        ))}
        {sending && (
          <div className="mrow">
            <div className="agav" style={{ width: 26, height: 26, fontSize: 9 }}>AI</div>
            <div className="bubble ai" style={{ display: 'flex', gap: 4, alignItems: 'center', padding: '10px 12px' }}>
              <span className="pulse" /><span className="pulse" /><span className="pulse" />
            </div>
          </div>
        )}
      </div>
      <div className="chat-bar">
        <input className="inp" style={{ flex: 1 }} placeholder="Investigue um achado, CNPJ ou padrão suspeito..."
          value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && !e.shiftKey && send()} disabled={sending} />
        <button className="btn pr" onClick={() => send()} disabled={!input.trim() || sending}>{I.send(13)}</button>
      </div>
    </div>
  );
};

/* ── APP ───────────────────────────────────── */
const App = () => {
  const [user, setUser] = useState(null);
  const [screen, setScreen] = useState('overview');
  const [eng, setEng] = useState(null);
  const [nAchados, setNAchados] = useState(0);
  const [checking, setChecking] = useState(!!localStorage.getItem('ct'));

  useEffect(() => {
    if (!localStorage.getItem('ct')) { setChecking(false); return; }
    api.get('/auth/me').then(setUser).catch(() => { localStorage.removeItem('ct'); api.token = null; }).finally(() => setChecking(false));
  }, []);

  useEffect(() => {
    if (!user) return;
    api.get('/api/audit/engagement').then(setEng).catch(() => {});
    api.get('/api/audit/achados').then(d => setNAchados(d.achados?.filter(a => a.status !== 'resolvido').length || 0)).catch(() => {});
  }, [user]);

  const logout = () => { localStorage.removeItem('ct'); api.token = null; setUser(null); };

  const titles = { overview: 'Visão geral', achados: 'Achados', matriz: 'Matriz de conformidade', exec: 'Execução do agente', extratos: 'Extratos', uploads: 'Uploads', notas: 'Notas fiscais', contratos: 'Contratos', qsa: 'QSA / Receita', laudo: 'Laudo de auditoria', forense: 'Assistente forense' };

  const mobileTabs = [
    { id: 'overview', lbl: 'Visão geral', icon: 13 },
    { id: 'achados', lbl: 'Achados', icon: 'achados' },
    { id: 'matriz', lbl: 'Matriz', icon: 'matriz' },
    { id: 'forense', lbl: 'Forense', icon: 'forense' },
    { id: 'laudo', lbl: 'Laudo', icon: 'laudo' },
  ];

  const pages = {
    overview: <Overview go={setScreen} />, achados: <Achados />, matriz: <Matriz />, exec: <Exec />,
    extratos: <Fontes screen="extratos" />, uploads: <Fontes screen="uploads" />,
    notas: <Fontes screen="notas" />, contratos: <Fontes screen="contratos" />, qsa: <Fontes screen="qsa" />,
    laudo: <Laudo />, forense: <Forense />,
  };

  if (checking) return <div style={{ width: '100%', height: '100dvh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Spin /></div>;
  if (!user) return <Login onLogin={setUser} />;

  const isChat = screen === 'forense';

  return (
    <div className="app">
      <Sidebar cur={screen} go={setScreen} user={user} logout={logout} eng={eng} nAchados={nAchados} />
      <div className="app-main">

        {/* Mobile header */}
        <div className="m-header">
          <LogoA size={26} />
          <span className="m-header-title">{titles[screen] || screen}</span>
          <button className="btn sm gh icon" onClick={() => setScreen('forense')}>{I.forense(16)}</button>
          <button className="btn sm pr" onClick={() => setScreen('laudo')}>{I.laudo(14)}</button>
        </div>

        {/* Desktop topbar */}
        <div className="topbar">
          <div className="tb-bc">
            <LogoFull />
            <span style={{ color: 'var(--bd)', margin: '0 4px' }}>/</span>
            <span>#{eng?.code || '—'}</span>
            <span style={{ color: 'var(--bd)' }}>/</span>
            <span className="tb-bc-cur">{titles[screen]}</span>
          </div>
          <div className="tb-search">
            <div className="tb-si">
              {I.forense(12)}
              <input className="tb-inp" placeholder="Buscar lançamento, CNPJ, contrato..." />
              <span className="tb-kbd">⌘K</span>
            </div>
          </div>
          <div className="tb-acts">
            <button className="btn sm gh icon">{I.bell(13)}</button>
            <button className="btn sm">{I.dl(12)}Exportar</button>
            <button className="btn sm pr" onClick={() => setScreen('laudo')}>{I.laudo(12)}Gerar laudo</button>
          </div>
        </div>

        {/* Content */}
        {isChat
          ? <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minHeight: 0 }}><Forense /></div>
          : <div className="page-scroll">{pages[screen] || pages.overview}</div>
        }

        {/* Mobile bottom tabs */}
        <div className="m-tabs">
          {mobileTabs.map(t => (
            <button key={t.id} className={`m-tab ${screen === t.id ? 'on' : ''}`} onClick={() => setScreen(t.id)}>
              <span style={{ display: 'flex', justifyContent: 'center' }}>
                {I[t.icon] ? I[t.icon](20) : I.overview(20)}
              </span>
              {t.lbl}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
