<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agility ConcilIA</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#FAF8F3;--sf:#FFFFFF;--sf2:#F2EFE7;--bd:#E4E0D6;--bd2:#EAE6DC;
  --ink:#0F1020;--ink2:#2E3050;--ink3:#6B6E8A;--ink4:#9FA2BC;
  --ok:#16A34A;--okb:#DCFCE7;--okbd:#86EFAC;
  --wn:#D97706;--wnb:#FEF3C7;--wnbd:#FCD34D;
  --rk:#DC2626;--rkb:#FEE2E2;--rkbd:#FCA5A5;
  --in:#4C4EF5;--inb:#EEEEFF;--inbd:#A5A6FB;
  --lime:#E6FF4C;--lime-ink:#0F1020;
  --primary:#4C4EF5;
  --sidebar:#0F1020;--r:8px;--rl:12px;
  --sh:0 1px 2px rgba(15,16,32,.06),0 2px 8px rgba(15,16,32,.04);
  --sh2:0 4px 20px rgba(15,16,32,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;font-family:'Geist',sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink);background:var(--bg);overflow:hidden;font-size:13px;}
#root{width:100%;height:100%;}

/* LAYOUT */
.layout{display:flex;width:100%;height:100%;}
.sidebar{width:220px;flex-shrink:0;height:100%;background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;}
.main{flex:1;height:100%;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
.topbar{height:48px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;padding:0 24px;flex-shrink:0;}
.content{flex:1;overflow-y:auto;padding:28px 32px;max-width:1400px;width:100%;}

/* SIDEBAR */
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-brand-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.02em;}
.sb-brand-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px;text-transform:uppercase;letter-spacing:.06em;}
.sb-eng{padding:12px 16px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);}
.sb-eng-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.25);margin-bottom:6px;}
.sb-eng-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);line-height:1.4;}
.sb-eng-cnpj{font-size:10px;color:rgba(255,255,255,.35);font-family:'Geist Mono',monospace;margin-top:2px;}
.sb-eng-period{font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;display:flex;align-items:center;gap:4px;}
.sb-section{padding:14px 16px 4px;}
.sb-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.2);margin-bottom:5px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:rgba(255,255,255,.45);transition:all .12s;border:none;background:transparent;width:100%;text-align:left;position:relative;}
.sb-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);}
.sb-item.on{background:rgba(76,78,245,.18);color:#fff;padding-left:8px;border-left:2px solid var(--primary);}
.sb-badge{margin-left:auto;font-size:9px;font-weight:700;background:var(--rk);color:#fff;padding:2px 6px;border-radius:100px;min-width:18px;text-align:center;}
.sb-badge.ok{background:var(--ok);}
.sb-badge.warn{background:var(--wn);}
.sb-bottom{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);}
.sb-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:7px;transition:background .12s;}
.sb-user:hover{background:rgba(255,255,255,.06);}
.sb-av{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}

/* TOPBAR */
.tb-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3);}
.tb-bc-sep{opacity:.4;}
.tb-bc-cur{color:var(--ink);font-weight:500;}
.tb-search{flex:1;max-width:340px;margin:0 auto;}
.tb-search-inner{display:flex;align-items:center;gap:8px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:6px 12px;}
.tb-search-inp{border:none;background:transparent;font-size:12px;color:var(--ink);outline:none;width:100%;font-family:inherit;}
.tb-search-kbd{font-size:10px;color:var(--ink4);background:var(--bd2);padding:1px 5px;border-radius:4px;font-family:'Geist Mono',monospace;}
.tb-actions{display:flex;align-items:center;gap:8px;margin-left:auto;}

/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);}
.ch{padding:13px 18px;border-bottom:1px solid var(--bd2);display:flex;align-items:center;justify-content:space-between;}
.ct{font-size:12px;font-weight:600;letter-spacing:-.01em;}
.cb{padding:18px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;box-shadow:var(--sh);position:relative;}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-.04em;margin-top:6px;font-variant-numeric:tabular-nums;line-height:1;}
.stat-sub{font-size:11px;color:var(--ink3);margin-top:5px;}
.stat-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;}

/* SCORE */
.score-ring{position:relative;display:flex;align-items:center;justify-content:center;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);padding:9px 16px;text-align:left;border-bottom:1px solid var(--bd2);background:var(--sf2);white-space:nowrap;}
.tbl td{padding:10px 16px;border-bottom:1px solid var(--bd2);font-size:12px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--sf2);}
.mono{font-family:'Geist Mono',monospace;font-variant-numeric:tabular-nums;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;border:1px solid;}
.bok{background:var(--okb);color:var(--ok);border-color:var(--okbd);}
.bwn{background:var(--wnb);color:var(--wn);border-color:var(--wnbd);}
.brk{background:var(--rkb);color:var(--rk);border-color:var(--rkbd);}
.bin{background:var(--inb);color:var(--in);border-color:var(--inbd);}
.bgray{background:var(--sf2);color:var(--ink3);border-color:var(--bd);}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dok{background:var(--ok);} .dwn{background:var(--wn);} .drk{background:var(--rk);} .din{background:var(--in);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);color:var(--ink);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;}
.btn:hover{background:var(--sf2);}
.btn.pr{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn.pr:hover{background:#3A3CE0;}
.btn.sm{padding:5px 10px;font-size:11px;}
.btn.gh{background:transparent;border-color:transparent;}
.btn.gh:hover{background:var(--sf2);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn.danger{background:var(--rkb);color:var(--rk);border-color:var(--rkbd);}

/* INPUTS */
.inp{width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf);font-size:13px;color:var(--ink);font-family:inherit;outline:none;transition:border .12s;}
.inp:focus{border-color:var(--ink);}

/* PROGRESS BAR */
.pbar{height:5px;background:var(--bd);border-radius:100px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:100px;transition:width .5s;}

/* LOG */
.log-line{padding:4px 0;border-bottom:1px solid var(--bd2);display:flex;gap:10px;font-family:'Geist Mono',monospace;font-size:11px;line-height:1.5;}
.log-ts{color:var(--ink4);flex-shrink:0;}
.log-ok{color:var(--ok);}
.log-warn{color:var(--wn);}
.log-critico{color:var(--rk);font-weight:600;}
.log-info{color:var(--ink3);}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:12px;}
.mrow{display:flex;gap:9px;align-items:flex-start;}
.mrow.me{flex-direction:row-reverse;}
.bubble{padding:10px 14px;border-radius:12px;font-size:12.5px;line-height:1.6;max-width:640px;white-space:pre-wrap;}
.bubble.ai{background:var(--sf);border:1px solid var(--bd);color:var(--ink);border-bottom-left-radius:3px;}
.bubble.me{background:var(--ink);color:#fff;border-bottom-right-radius:3px;}
.agav{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.pulse{width:4px;height:4px;border-radius:50%;background:var(--ink3);animation:pulse .9s ease-in-out infinite;}
.pulse:nth-child(2){animation-delay:.15s;} .pulse:nth-child(3){animation-delay:.3s;}
.chat-bar{padding:12px 20px 16px;border-top:1px solid var(--bd);background:var(--sf);display:flex;gap:8px;flex-shrink:0;}

/* LOGIN */
.login-pg{width:100%;height:100%;display:flex;}
.login-l{flex:1;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;}
.login-r{width:440px;display:flex;align-items:center;justify-content:center;padding:56px;background:var(--bg);}
.lform{width:100%;max-width:340px;}
.lfield{margin-bottom:12px;}
.llbl{font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:5px;display:block;}
.lerr{background:var(--rkb);border:1px solid var(--rkbd);border-radius:var(--r);padding:9px 13px;font-size:12px;color:var(--rk);margin-bottom:12px;}

/* BENFORD CHART */
.benford-bar{display:flex;align-items:flex-end;gap:3px;height:80px;}
.bf-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.bf-bars{display:flex;align-items:flex-end;gap:1px;height:68px;}
.bf-b{border-radius:2px 2px 0 0;min-width:8px;}

/* GRID HELPERS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.pt{font-size:22px;font-weight:700;letter-spacing:-.04em;}
.ps{font-size:12px;color:var(--ink3);margin-top:3px;}

/* RESPONSIVE */
@media(max-width:900px){.sidebar{display:none;}.stats-row{grid-template-columns:1fr 1fr;}.g2,.g3{grid-template-columns:1fr;}}

/* ANIMATIONS */
@keyframes pulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.5);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fup{animation:fup .2s ease both;}
.spin{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

/* INDICIO CARD */
.indicio-card{padding:14px 16px;border-left:3px solid;border-radius:0 var(--r) var(--r) 0;background:var(--sf);margin-bottom:8px;border-top:1px solid var(--bd);border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);}
.lime-tag{background:var(--lime);color:var(--lime-ink);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Geist Mono',monospace;}
.ia-found{background:var(--lime);color:var(--lime-ink);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;}
.tagline{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:var(--ink);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = 'https://187.127.251.194.nip.io';
const {useState,useEffect,useRef,useCallback}=React;

const api={
  token:localStorage.getItem('ct'),
  async r(m,p,b){
    const h={'Content-Type':'application/json'};
    if(this.token) h['Authorization']=`Bearer ${this.token}`;
    const res=await fetch(API+p,{method:m,headers:h,body:b?JSON.stringify(b):undefined});
    const d=await res.json();
    if(!res.ok) throw new Error(d.error||'Erro');
    return d;
  },
  get:p=>api.r('GET',p),
  post:(p,b)=>api.r('POST',p,b),
  patch:(p,b)=>api.r('PATCH',p,b),
  put:(p,b)=>api.r('PUT',p,b),
  del:p=>api.r('DELETE',p),
};

const BRL=n=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const BRLk=n=>n>=1000000?`R$ ${(n/1000000).toFixed(1)}M`:n>=1000?`R$ ${(n/1000).toFixed(0)}k`:BRL(n);
const fdt=d=>{try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}catch{return d}};

// ICONS
const Ico=({d,size=14,stroke=1.7,style,children})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={style}>
    {children||<path d={d}/>}
  </svg>
);
const I={
  overview: p=><Ico {...p}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></Ico>,
  achados: p=><Ico {...p}><path d="m10.29 3.86-8.47 14.64A2 2 0 0 0 3.54 21h16.92a2 2 0 0 0 1.72-3l-8.47-14.64a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></Ico>,
  matriz: p=><Ico {...p}><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></Ico>,
  exec: p=><Ico {...p}><circle cx="12" cy="12" r="3"/><path d="M12 3v1M12 20v1M3 12h1M20 12h1M5.6 5.6l.7.7M17.7 17.7l.7.7M5.6 18.4l.7-.7M17.7 6.3l.7-.7"/></Ico>,
  extrato: p=><Ico {...p}><path d="M3 21h18M3 10h18M5 6l7-4 7 4M4 10v11M20 10v11M8 14v4M12 14v4M16 14v4"/></Ico>,
  upload: p=><Ico {...p}><path d="M12 15V3m-5 5 5-5 5 5M20 21H4"/></Ico>,
  nfe: p=><Ico {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></Ico>,
  contrato: p=><Ico {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m9 15 2 2 4-4"/></Ico>,
  qsa: p=><Ico {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Ico>,
  laudo: p=><Ico {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6M9 15h6"/></Ico>,
  forense: p=><Ico {...p}><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Ico>,
  flag: p=><Ico {...p}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></Ico>,
  logout: p=><Ico {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Ico>,
  run: p=><Ico {...p}><polygon points="5 3 19 12 5 21 5 3"/></Ico>,
  dl: p=><Ico {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Ico>,
  bell: p=><Ico {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></Ico>,
  send: p=><Ico {...p}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></Ico>,
  ok: p=><Ico {...p}><polyline points="20 6 9 17 4 12"/></Ico>,
  x: p=><Ico {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Ico>,
  edit: p=><Ico {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Ico>,
  caret: p=><Ico {...p}><polyline points="9 18 15 12 9 6"/></Ico>,
};

const Spin=()=><div className="spin"/>;

// Agility ConcilIA isotipo — A com crossbar indigo e ponto lime
const LogoA=({size=32,dark=false})=>(
  <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
    {/* Left pillar */}
    <path d="M8 92 L50 8 L92 92" stroke={dark?"#fff":"#0F1020"} strokeWidth="11" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    {/* Crossbar — indigo */}
    <line x1="25" y1="62" x2="72" y2="62" stroke="#4C4EF5" strokeWidth="9" strokeLinecap="round"/>
    {/* Lime dot */}
    <circle cx="72" cy="62" r="6" fill="#E6FF4C"/>
  </svg>
);

const LogoFull=({dark=false})=>(
  <div style={{display:'flex',alignItems:'center',gap:10}}>
    <LogoA size={28} dark={dark}/>
    <div>
      <div style={{fontSize:14,fontWeight:700,letterSpacing:'-.03em',color:dark?'#fff':'var(--ink)',lineHeight:1.1}}>
        Agility <span style={{color:'#4C4EF5'}}>Concil</span><span style={{color:'#4C4EF5',fontWeight:700}}>IA</span>
      </div>
    </div>
  </div>
);

// Score Ring SVG
const ScoreRing=({score,size=90})=>{
  const stroke=8,r=(size-stroke)/2,c=2*Math.PI*r,dash=(score/100)*c;
  const color=score>=80?'var(--primary)':score>=60?'var(--wn)':'var(--rk)';
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bd)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${c}`} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:'stroke-dasharray .6s'}}/>
      <text x={size/2} y={size/2-2} textAnchor="middle" dominantBaseline="central"
        style={{fontSize:size*.24,fontWeight:700,fill:'var(--ink)',fontFamily:'Geist'}}>{score}</text>
      <text x={size/2} y={size/2+size*.17} textAnchor="middle" dominantBaseline="central"
        style={{fontSize:size*.1,fill:'var(--ink3)',fontFamily:'Geist',fontWeight:500,letterSpacing:'0.04em'}}>SCORE</text>
    </svg>
  );
};

// Benford mini chart
const BenfordChart=({data})=>{
  if(!data||!data.length) return null;
  const maxVal=Math.max(...data.map(d=>Math.max(d.esperado,d.observado)));
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:4,height:90,padding:'0 4px'}}>
      {data.map(d=>{
        const hE=(d.esperado/maxVal)*70,hO=(d.observado/maxVal)*70;
        const over=d.observado>d.esperado*1.3;
        return(
          <div key={d.digito} style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1,gap:3}}>
            <div style={{display:'flex',alignItems:'flex-end',gap:1,height:70}}>
              <div style={{width:9,height:hE,background:'var(--bd)',borderRadius:'2px 2px 0 0'}}/>
              <div style={{width:9,height:hO,background:over?'var(--rk)':'var(--ok)',borderRadius:'2px 2px 0 0',opacity:.85}}/>
            </div>
            <div style={{fontSize:9,color:over?'var(--rk)':'var(--ink4)',fontWeight:over?700:400}}>{d.digito}</div>
          </div>
        );
      })}
    </div>
  );
};

        <div style={{padding:'12px 18px',fontFamily:'Geist Mono',fontSize:12,background:'#0D0D0F',borderRadius:'0 0 var(--rl) var(--rl)'}}>
          {loading?<div style={{color:'#666',padding:20}}>Carregando...</div>:logs.map((l,i)=>(
            <div key={i} style={{display:'flex',gap:14,padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
              <span style={{color:'#555',flexShrink:0}}>{l.ts}</span>
              <span style={{color:l.tipo==='critico'?'#ff6b6b':l.tipo==='warn'?'#f0a500':l.tipo==='ok'?'#6fcf97':'#888'}}>·</span>
              <span style={{color:l.tipo==='critico'?'#ff6b6b':l.tipo==='warn'?'#f0a500':l.tipo==='ok'?'#6fcf97':'#aaa'}}>{l.msg}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// FONTES (shared between extratos, uploads, notas, contratos, qsa)
const Fontes=({screen})=>{
  const [data,setData]=useState(null);
  const [docs,setDocs]=useState([]);
  const [uploading,setUploading]=useState(false);
  const [drag,setDrag]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    api.get('/api/audit/fontes').then(setData).catch(console.error);
    api.get('/api/upload').then(d=>setDocs(d.documents||[])).catch(console.error);
  },[]);
  const titles={extratos:'Extratos bancários',uploads:'Uploads',notas:'Notas fiscais',contratos:'Contratos',qsa:'QSA / Receita'};
  const doUpload=async files=>{
    setUploading(true);const form=new FormData();Array.from(files).forEach(f=>form.append('files',f));
    try{const res=await fetch(API+'/api/upload',{method:'POST',headers:{Authorization:`Bearer ${api.token}`},body:form});const d=await res.json();if(!res.ok)throw new Error(d.error);const r=await api.get('/api/upload');setDocs(r.documents||[]);}
    catch(e){alert('Erro: '+e.message);}finally{setUploading(false);}
  };
  return(
    <div className="content fup">
      <div className="ph"><div><div className="pt">{titles[screen]||'Fontes'}</div><div className="ps">Documentos indexados para análise</div></div></div>
      <div className="g2">
        <div>
          <div className={`card ${drag?'drag':''}`} style={{marginBottom:16,cursor:'pointer'}}
            onClick={()=>ref.current?.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);doUpload(e.dataTransfer.files);}}>
            <div className="cb" style={{textAlign:'center',padding:'32px 20px'}}>
              <div style={{width:48,height:48,borderRadius:12,background:'var(--sf2)',border:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
                {uploading?<Spin/>:<I.upload size={22} style={{color:'var(--ink3)'}}/>}
              </div>
              <div style={{fontWeight:600,fontSize:14}}>{uploading?'Enviando...':'Adicionar documentos'}</div>
              <div style={{fontSize:11,color:'var(--ink3)',marginTop:4}}>OFX, XML NF-e, PDF de contratos, CSV</div>
              <input ref={ref} type="file" multiple accept=".pdf,.ofx,.xml,.jpg,.png,.csv" style={{display:'none'}} onChange={e=>doUpload(e.target.files)}/>
            </div>
          </div>
          {data&&(
            <div className="card">
              <div className="ch"><div className="ct">Resumo das fontes</div></div>
              {[
                {ic:I.extrato,l:'Extratos bancários',v:`${data.extratos.total} arquivos`,s:data.extratos.bancos?.join(', ')},
                {ic:I.nfe,l:'Notas fiscais',v:`${data.notas_fiscais.total} NF-e/NFS-e`,s:'SEFAZ indexado'},
                {ic:I.contrato,l:'Contratos',v:`${data.contratos.total} contratos`,s:'PDF processados'},
                {ic:I.qsa,l:'QSA / Receita',v:`${data.qsa.total} empresas`,s:'Cruzamento ativo'},
              ].map(s=>(
                <div key={s.l} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 16px',borderBottom:'1px solid var(--bd2)'}}>
                  <div style={{width:32,height:32,borderRadius:8,background:'var(--sf2)',border:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><s.ic size={15} style={{color:'var(--ink3)'}}/></div>
                  <div style={{flex:1}}><div style={{fontWeight:500,fontSize:12}}>{s.l}</div><div style={{fontSize:11,color:'var(--ink3)'}}>{s.s}</div></div>
                  <div style={{fontWeight:600,fontSize:12}}>{s.v}</div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="card">
          <div className="ch"><div className="ct">Arquivos ({docs.length})</div></div>
          <div style={{overflowY:'auto',maxHeight:500}}>
            {docs.length===0?<div style={{padding:40,textAlign:'center',color:'var(--ink3)'}}>Nenhum arquivo ainda</div>:
            docs.map(d=>(
              <div key={d.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderBottom:'1px solid var(--bd2)'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.filename}</div>
                  <div style={{fontSize:10,color:'var(--ink3)',fontFamily:'Geist Mono',marginTop:2}}>{(d.size/1024).toFixed(0)} KB · {d.type}</div>
                </div>
                <span className={`badge ${d.status==='done'?'bok':d.status==='error'?'brk':'bwn'}`}>{d.status==='done'?'Lido':d.status==='error'?'Erro':'Processando'}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// LAUDO
const Laudo=()=>{
  const [generating,setGenerating]=useState(false);
  const [data,setData]=useState(null);
  useEffect(()=>{api.get('/api/audit/overview').then(setData).catch(console.error);},[]);
  const gen=async()=>{
    setGenerating(true);
    setTimeout(()=>{setGenerating(false);alert('Laudo gerado! Em um ambiente de produção, o PDF seria baixado automaticamente.');},3000);
  };
  const eng=data?.engagement;
  return(
    <div className="content fup">
      <div className="ph">
        <div><div className="pt">Laudo de auditoria</div><div className="ps">Documento formal de evidências e achados</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn pr" onClick={gen} disabled={generating}>{generating?<><Spin/>Gerando...</>:<><I.dl size={13}/>Gerar laudo PDF</>}</button>
        </div>
      </div>
      <div className="g2">
        <div className="card">
          <div className="ch"><div className="ct">Dados do engajamento</div><button className="btn sm gh"><I.edit size={12}/>Editar</button></div>
          <div className="cb">
            {[
              {l:'Empresa auditada',v:eng?.empresa||'—'},
              {l:'CNPJ',v:eng?.cnpj||'—'},
              {l:'Engajamento',v:eng?.code||'—'},
              {l:'Período',v:eng?`${eng.periodo_inicio} a ${eng.periodo_fim}`:'—'},
              {l:'Score de confiança',v:`${data?.score||78}/100`},
              {l:'Total de achados',v:`${data?.achados_total||0} (${data?.indicios_fraude||0} indícios de fraude)`},
              {l:'Exposição financeira',v:BRL(data?.exposicao_financeira)},
            ].map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--bd2)',fontSize:12}}>
                <span style={{color:'var(--ink3)'}}>{r.l}</span>
                <span style={{fontWeight:500}}>{r.v}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="ch"><div className="ct">Estrutura do laudo</div></div>
          <div className="cb">
            {[
              {n:'1.',t:'Sumário executivo',s:'Visão geral e conclusões principais'},
              {n:'2.',t:'Escopo e metodologia',s:'Fontes, período e técnicas utilizadas'},
              {n:'3.',t:'Achados e evidências',s:`${data?.achados_total||0} achados detalhados com evidências`},
              {n:'4.',t:'Análise estatística',s:'Lei de Benford, distribuições e padrões'},
              {n:'5.',t:'Partes relacionadas',s:'Cruzamento QSA e conflitos de interesse'},
              {n:'6.',t:'Matriz de conformidade',s:'Avaliação de controles internos'},
              {n:'7.',t:'Recomendações',s:'Ações corretivas prioritárias'},
              {n:'8.',t:'Anexos',s:'Planilhas, extratos e documentos de suporte'},
            ].map(s=>(
              <div key={s.n} style={{display:'flex',gap:12,padding:'9px 0',borderBottom:'1px solid var(--bd2)'}}>
                <span style={{fontWeight:700,color:'var(--ink3)',fontSize:12,minWidth:24}}>{s.n}</span>
                <div><div style={{fontWeight:500,fontSize:12}}>{s.t}</div><div style={{fontSize:11,color:'var(--ink3)',marginTop:2}}>{s.s}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// FORENSE (chat)
const Forense=()=>{
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState('');
  const [sending,setSending]=useState(false);
  const ref=useRef();
  useEffect(()=>{ref.current&&(ref.current.scrollTop=ref.current.scrollHeight);},[msgs]);
  const send=async text=>{
    const m=text||input.trim();if(!m||sending)return;
    setInput('');setSending(true);
    setMsgs(p=>[...p,{id:Date.now(),role:'user',content:m}]);
    try{const d=await api.post('/api/audit/forense',{message:m});setMsgs(p=>[...p,d.message]);}
    catch(e){setMsgs(p=>[...p,{id:Date.now()+1,role:'assistant',content:'Erro: '+e.message}]);}
    finally{setSending(false);}
  };
  const suggs=['Resumo do engajamento','Detalhes do achado F-001','Análise de Benford','Qual a exposição financeira?'];
  return(
    <div className="chat-wrap">
      <div style={{padding:'14px 24px 0',borderBottom:'1px solid var(--bd)',background:'var(--sf)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10,paddingBottom:12}}>
          <div className="agav" style={{width:36,height:36,fontSize:11,background:'var(--ink)'}}>AI</div>
          <div>
            <div style={{fontWeight:700,fontSize:14,letterSpacing:'-.02em'}}>Assistente Forense</div>
            <div style={{fontSize:11,color:'var(--ok)',fontWeight:500,display:'flex',alignItems:'center',gap:5,marginTop:1}}><span className="dot dok" style={{width:5,height:5}}/>online · acesso a todos os achados</div>
          </div>
        </div>
      </div>
      <div ref={ref} className="chat-msgs">
        {msgs.length===0&&(
          <div style={{textAlign:'center',padding:'48px 20px',color:'var(--ink3)'}}>
            <div style={{fontSize:32,marginBottom:12}}>🔍</div>
            <div style={{fontSize:15,fontWeight:600,color:'var(--ink)',marginBottom:6}}>Assistente Forense Contábil</div>
            <div style={{fontSize:12,lineHeight:1.65}}>Tenho acesso a todos os achados, documentos e análises.<br/>Posso ajudar a investigar qualquer transação suspeita.</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:7,justifyContent:'center',marginTop:20}}>
              {suggs.map(s=><button key={s} className="btn sm" onClick={()=>send(s)}>{s}</button>)}
            </div>
          </div>
        )}
        {msgs.map((m,i)=>(
          <div key={m.id||i} className="fup" style={{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start',gap:6}}>
            <div className={`mrow ${m.role==='user'?'me':''}`}>
              {m.role==='assistant'&&<div className="agav" style={{width:26,height:26,fontSize:9,flexShrink:0}}>AI</div>}
              <div className={`bubble ${m.role==='user'?'me':'ai'}`}>{m.content}</div>
            </div>
          </div>
        ))}
        {sending&&<div className="mrow"><div className="agav" style={{width:26,height:26,fontSize:9}}>AI</div><div className="bubble ai" style={{display:'flex',gap:4,alignItems:'center',padding:'10px 12px'}}><span className="pulse"/><span className="pulse"/><span className="pulse"/></div></div>}
      </div>
      <div className="chat-bar">
        <input className="inp" style={{flex:1}} placeholder="Investigue um achado, CNPJ, valor ou padrão suspeito..."
          value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()} disabled={sending}/>
        <button className="btn pr" onClick={()=>send()} disabled={!input.trim()||sending}><I.send size={13}/>Enviar</button>
      </div>
    </div>
  );
};

// APP
const App=()=>{
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState('overview');
  const [eng,setEng]=useState(null);
  const [nAchados,setNAchados]=useState(0);
  const [checking,setChecking]=useState(!!localStorage.getItem('ct'));

  useEffect(()=>{
    if(!localStorage.getItem('ct')){setChecking(false);return;}
    api.get('/auth/me').then(setUser).catch(()=>{localStorage.removeItem('ct');api.token=null;}).finally(()=>setChecking(false));
  },[]);

  useEffect(()=>{
    if(!user) return;
    api.get('/api/audit/engagement').then(setEng).catch(()=>{});
    api.get('/api/audit/achados').then(d=>setNAchados(d.achados?.filter(a=>a.status!=='resolvido').length||0)).catch(()=>{});
  },[user]);

  const logout=()=>{localStorage.removeItem('ct');api.token=null;setUser(null);};

  const screenTitle={overview:'Visão geral',achados:'Achados',matriz:'Matriz de conformidade',exec:'Execução do agente',extratos:'Extratos',uploads:'Uploads',notas:'Notas fiscais',contratos:'Contratos',qsa:'QSA / Receita',laudo:'Laudo de auditoria',forense:'Assistente forense'};

  const pages={
    overview: <Overview eng={eng} go={setScreen}/>,
    achados: <Achados/>,
    matriz: <Matriz/>,
    exec: <Exec/>,
    extratos: <Fontes screen="extratos"/>,
    uploads: <Fontes screen="uploads"/>,
    notas: <Fontes screen="notas"/>,
    contratos: <Fontes screen="contratos"/>,
    qsa: <Fontes screen="qsa"/>,
    laudo: <Laudo/>,
    forense: <Forense/>,
  };

  if(checking) return <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><Spin/></div>;
  if(!user) return <Login onLogin={setUser}/>;

  return(
    <div className="layout">
      <Sidebar cur={screen} go={setScreen} user={user} logout={logout} eng={eng} nAchados={nAchados}/>
      <div className="main">
        <div className="topbar">
          <div className="tb-breadcrumb" style={{display:"flex",alignItems:"center",gap:8}}><LogoA size={20}/>
            <span>Engajamento #{eng?.code||'—'}</span>
            <span className="tb-bc-sep"><I.caret size={12}/></span>
            <span className="tb-bc-cur">{screenTitle[screen]||screen}</span>
          </div>
          <div className="tb-search">
            <div className="tb-search-inner">
              <I.forense size={13} style={{color:'var(--ink4)',flexShrink:0}}/>
              <input className="tb-search-inp" placeholder="Buscar lançamento, CNPJ, contrato..."/>
              <span className="tb-search-kbd">⌘K</span>
            </div>
          </div>
          <div className="tb-actions">
            <button className="btn sm gh"><I.bell size={13}/></button>
            <button className="btn sm" onClick={()=>setScreen('laudo')}><I.dl size={13}/>Exportar evidências</button>
            <button className="btn sm pr" onClick={()=>setScreen('laudo')}><I.laudo size={13}/>Gerar laudo</button>
          </div>
        </div>
        <div style={{flex:1,overflow:screen==='forense'?'hidden':'auto',display:'flex',flexDirection:'column'}}>
          {screen==='forense'?<Forense/>:<div style={{overflowY:'auto',flex:1}}>{pages[screen]||pages.overview}</div>}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
