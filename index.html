<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contabil - Conciliacao com IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#F7F6F2;--sf:#FFF;--sf2:#F0EFE9;--bd:#E2E0D8;--bd2:#ECEAE3;--ink:#1C1C1F;--ink2:#44444A;--ink3:#78787F;--ink4:#ACACB2;--ok:#2D7D52;--okb:#EBF5EE;--okbd:#C3E0CE;--wn:#92600A;--wnb:#FEF3E2;--wnbd:#F5D9A0;--rk:#C0392B;--rkb:#FDECEA;--rkbd:#F5C0BB;--in:#1A5EA8;--inb:#EAF1FC;--inbd:#BAD1F5;--sw:240px;--r:10px;--rl:14px;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink);background:var(--bg);overflow:hidden;}
#root{width:100%;height:100%;}
.layout{display:flex;width:100%;height:100%;}
.main{flex:1;height:100%;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
.mscroll{flex:1;overflow-y:auto;}
.page{padding:32px 36px;max-width:1200px;width:100%;}
.sidebar{width:var(--sw);flex-shrink:0;height:100%;background:var(--ink);display:flex;flex-direction:column;}
.slogo{display:flex;align-items:center;gap:10px;padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08);}
.smark{width:32px;height:32px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.snav{padding:14px 12px 4px;}
.snlbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:0 8px;margin-bottom:4px;}
.sitem{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:500;color:rgba(255,255,255,.55);transition:background .12s,color .12s;border:none;background:transparent;width:100%;text-align:left;}
.sitem:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sitem.on{background:rgba(255,255,255,.12);color:#fff;}
.sbadge{margin-left:auto;font-size:10px;font-weight:700;background:var(--rk);color:#fff;padding:2px 7px;border-radius:100px;}
.sbot{margin-top:auto;padding:14px 12px;border-top:1px solid rgba(255,255,255,.08);}
.suser{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .12s;}
.suser:hover{background:rgba(255,255,255,.07);}
.av{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.mh{display:none;align-items:center;gap:12px;padding:12px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;}
.mt{display:none;justify-content:space-around;padding:8px 0 16px;background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0;}
.mtab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 14px;font-size:10px;font-weight:500;color:var(--ink3);border:none;background:transparent;cursor:pointer;font-family:inherit;}
.mtab.on{color:var(--ink);}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.pt{font-size:26px;font-weight:700;letter-spacing:-.04em;}
.ps{font-size:14px;color:var(--ink3);margin-top:3px;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:20px;box-shadow:var(--sh);position:relative;overflow:hidden;}
.scacc{position:absolute;top:0;left:0;width:3px;height:100%;}
.scl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);}
.scv{font-size:24px;font-weight:700;letter-spacing:-.04em;margin-top:8px;font-variant-numeric:tabular-nums;}
.scs{font-size:12px;color:var(--ink3);margin-top:4px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);}
.ch{padding:14px 20px;border-bottom:1px solid var(--bd2);display:flex;align-items:center;justify-content:space-between;}
.ct{font-size:13px;font-weight:600;}
.cb{padding:20px;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);padding:10px 16px;text-align:left;border-bottom:1px solid var(--bd2);background:var(--sf2);white-space:nowrap;}
.tbl td{padding:11px 16px;border-bottom:1px solid var(--bd2);font-size:13px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--sf2);}
.mono{font-family:'DM Mono',monospace;font-variant-numeric:tabular-nums;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:600;}
.bok{background:var(--okb);color:var(--ok);border:1px solid var(--okbd);}
.bwn{background:var(--wnb);color:var(--wn);border:1px solid var(--wnbd);}
.brk{background:var(--rkb);color:var(--rk);border:1px solid var(--rkbd);}
.bin{background:var(--inb);color:var(--in);border:1px solid var(--inbd);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dok{background:var(--ok);} .dwn{background:var(--wn);} .drk{background:var(--rk);} .din{background:var(--in);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);color:var(--ink);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .12s;letter-spacing:-.01em;white-space:nowrap;}
.btn:hover{background:var(--sf2);}
.btn.pr{background:var(--ink);color:#fff;border-color:var(--ink);}
.btn.pr:hover{background:#2d2d30;}
.btn.sm{padding:6px 12px;font-size:12px;}
.btn.gh{background:transparent;border-color:transparent;}
.btn.gh:hover{background:var(--sf2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.inp{width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf);font-size:14px;color:var(--ink);font-family:inherit;outline:none;transition:border-color .12s;}
.inp:focus{border-color:var(--ink);}
.ftabs{display:flex;gap:3px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:3px;}
.ftab{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .12s;}
.ftab.on{background:var(--sf);color:var(--ink);box-shadow:var(--sh);}
.prog{height:6px;background:var(--bd);border-radius:100px;overflow:hidden;}
.progb{height:100%;border-radius:100px;transition:width .4s;}
.chat-layout{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:12px;}
.mrow{display:flex;gap:10px;align-items:flex-start;}
.mrow.me{flex-direction:row-reverse;}
.bubble{padding:11px 15px;border-radius:14px;font-size:13.5px;line-height:1.55;max-width:620px;}
.bubble.ai{background:var(--sf);border:1px solid var(--bd);color:var(--ink);border-bottom-left-radius:4px;}
.bubble.me{background:var(--ink);color:#fff;border-bottom-right-radius:4px;}
.agav{width:32px;height:32px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--ink3);animation:pulse .9s ease-in-out infinite;}
.pulse:nth-child(2){animation-delay:.15s;} .pulse:nth-child(3){animation-delay:.3s;}
.cbar{padding:14px 24px 20px;border-top:1px solid var(--bd);background:var(--sf);display:flex;gap:10px;flex-shrink:0;}
.lpg{width:100%;height:100%;display:flex;}
.ll{flex:1;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;}
.lr{width:480px;display:flex;align-items:center;justify-content:center;padding:60px;background:var(--bg);}
.lform{width:100%;max-width:360px;}
.lfield{margin-bottom:14px;}
.llbl{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;display:block;}
.lerr{background:var(--rkb);border:1px solid var(--rkbd);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--rk);margin-bottom:14px;}
.dz{border:2px dashed var(--bd);border-radius:var(--rl);padding:48px 32px;text-align:center;cursor:pointer;transition:all .15s;background:var(--sf);}
.dz:hover,.dz.drag{border-color:var(--ink);background:var(--sf2);}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:768px){
  .sidebar{display:none;} .mh{display:flex;} .mt{display:flex;}
  .page{padding:16px;} .sg{grid-template-columns:1fr 1fr;gap:10px;} .scv{font-size:20px;} .pt{font-size:20px;}
  .ll{display:none;} .lr{width:100%;padding:32px 24px;}
  .chat-msgs{padding:16px;} .cbar{padding:12px 16px 18px;}
  .twocol{grid-template-columns:1fr !important;}
}
@media(max-width:420px){.sg{grid-template-columns:1fr;}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.5);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fup{animation:fup .22s ease both;}
.spin{width:18px;height:18px;border:2.5px solid var(--bd);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = 'https://187.127.251.194.nip.io';
const api = {
  token: localStorage.getItem('ct'),
  async r(m,p,b){
    const h={'Content-Type':'application/json'};
    if(this.token) h['Authorization']=`Bearer ${this.token}`;
    const res=await fetch(API+p,{method:m,headers:h,body:b?JSON.stringify(b):undefined});
    const d=await res.json();
    if(!res.ok) throw new Error(d.error||'Erro');
    return d;
  },
  get:p=>api.r('GET',p),
  post:(p,b)=>api.r('POST',p,b),
  patch:(p,b)=>api.r('PATCH',p,b),
  del:p=>api.r('DELETE',p),
};
const BRL=n=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0);
const fdt=d=>{try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}catch{return d}};
const {useState,useEffect,useRef}=React;

const Ico=({children,size=16,stroke=1.8,style})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={style}>{children}</svg>
);
const I={
  home:p=><Ico {...p}><path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1z"/></Ico>,
  txs:p=><Ico {...p}><path d="M3 3v18h18"/><path d="M7 16l4-4 4 3 5-7"/></Ico>,
  bell:p=><Ico {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></Ico>,
  up:p=><Ico {...p}><path d="M12 15V3m-5 5 5-5 5 5M20 21H4"/></Ico>,
  chat:p=><Ico {...p}><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></Ico>,
  rep:p=><Ico {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></Ico>,
  ok:p=><Ico {...p}><path d="M20 6 9 17l-5-5"/></Ico>,
  x:p=><Ico {...p}><path d="M18 6 6 18M6 6l12 12"/></Ico>,
  send:p=><Ico {...p}><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></Ico>,
  out:p=><Ico {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5M21 12H9"/></Ico>,
  ref:p=><Ico {...p}><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></Ico>,
  dl:p=><Ico {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5M12 15V3"/></Ico>,
  sh:p=><Ico {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Ico>,
  pl:p=><Ico {...p}><path d="M12 5v14M5 12h14"/></Ico>,
};

const Spin=()=><div className="spin"/>;
const Mark=()=>(<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M7 13.5l3 3 7-7" stroke="var(--ink)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>);

const Donut=({pct=0,size=120,stroke=11})=>{
  const r=(size-stroke)/2,c=2*Math.PI*r,dash=(pct/100)*c;
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bd)" strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--ok)" strokeWidth={stroke} strokeDasharray={`${dash} ${c}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:'stroke-dasharray .5s'}}/>
    <text x={size/2} y={size/2-2} textAnchor="middle" dominantBaseline="central" style={{fontSize:size*.22,fontWeight:700,fill:'var(--ink)',fontFamily:'DM Sans'}}> {pct}%</text>
    <text x={size/2} y={size/2+size*.17} textAnchor="middle" dominantBaseline="central" style={{fontSize:size*.075,fill:'var(--ink3)',fontFamily:'DM Sans',fontWeight:500,letterSpacing:'0.06em'}}> CONCILIADO</text>
  </svg>);
};

const Sidebar=({cur,go,user,logout,na})=>{
  const items=[
    {id:'dashboard',lbl:'Dashboard',Ic:I.home},
    {id:'transactions',lbl:'Lancamentos',Ic:I.txs},
    {id:'alerts',lbl:'Alertas',Ic:I.bell,badge:na},
    {id:'upload',lbl:'Documentos',Ic:I.up},
    {id:'chat',lbl:'Agente IA',Ic:I.chat},
    {id:'report',lbl:'Relatorio',Ic:I.rep},
  ];
  return(<nav className="sidebar">
    <div className="slogo">
      <div className="smark"><Mark/></div>
      <div>
        <div style={{fontSize:16,fontWeight:700,letterSpacing:'-.03em',color:'#fff'}}>Contabil</div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.35)',marginTop:1}}>Conciliacao com IA</div>
      </div>
    </div>
    <div className="snav">
      <div className="snlbl">Menu</div>
      {items.map(it=>(<button key={it.id} className={`sitem ${cur===it.id?'on':''}`} onClick={()=>go(it.id)}>
        <it.Ic size={15} stroke={cur===it.id?2.2:1.8}/>
        {it.lbl}
        {it.badge>0&&<span className="sbadge">{it.badge}</span>}
      </button>))}
    </div>
    <div className="sbot">
      <div className="suser" onClick={logout} title="Sair">
        <div className="av">{user?.name?.[0]||'U'}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:500,color:'rgba(255,255,255,.8)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?.name}</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?.email}</div>
        </div>
        <I.out size={13} style={{color:'rgba(255,255,255,.25)',flexShrink:0}}/>
      </div>
    </div>
  </nav>);
};

const MH=({cur})=>{
  const t={dashboard:'Dashboard',transactions:'Lancamentos',alerts:'Alertas',upload:'Documentos',chat:'Agente IA',report:'Relatorio'};
  return(<div className="mh">
    <div style={{width:28,height:28,borderRadius:8,background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'center'}}><Mark/></div>
    <span style={{fontWeight:600,fontSize:16,letterSpacing:'-.02em'}}>{t[cur]}</span>
  </div>);
};
const MTabs=({cur,go,na})=>{
  const tabs=[{id:'dashboard',lbl:'Inicio',Ic:I.home},{id:'transactions',lbl:'Lancamentos',Ic:I.txs},{id:'alerts',lbl:'Alertas',Ic:I.bell},{id:'chat',lbl:'Agente',Ic:I.chat},{id:'report',lbl:'Relatorio',Ic:I.rep}];
  return(<div className="mt">{tabs.map(t=>(<button key={t.id} className={`mtab ${cur===t.id?'on':''}`} onClick={()=>go(t.id)}><t.Ic size={20} stroke={cur===t.id?2.2:1.8}/><span>{t.lbl}</span></button>))}</div>);
};

const Login=({onLogin})=>{
  const [email,setEmail]=useState('demo@contabil.app');
  const [pass,setPass]=useState('demo123');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const submit=async()=>{
    setLoading(true);setErr('');
    try{const d=await api.post('/auth/login',{email,password:pass});api.token=d.token;localStorage.setItem('ct',d.token);onLogin(d.user);}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  };
  return(<div className="lpg">
    <div className="ll">
      <div style={{textAlign:'center',maxWidth:340}}>
        <div style={{width:60,height:60,borderRadius:16,background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.12)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 22px'}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M7 13.5l3 3 7-7" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{fontSize:30,fontWeight:700,letterSpacing:'-.05em',color:'#fff',marginBottom:10}}>Contabil</div>
        <div style={{fontSize:14,color:'rgba(255,255,255,.45)',lineHeight:1.65}}>Conciliacao contabil automatizada com inteligencia artificial para empresas brasileiras.</div>
        <div style={{marginTop:36,display:'flex',flexDirection:'column',gap:11,textAlign:'left'}}>
          {['Conciliacao automatica com IA','Alertas de risco em tempo real','Chat com agente especializado','Relatorios e DRE gerencial'].map(f=>(<div key={f} style={{display:'flex',alignItems:'center',gap:10,color:'rgba(255,255,255,.65)',fontSize:13.5}}>
            <div style={{width:20,height:20,borderRadius:6,background:'rgba(255,255,255,.08)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I.ok size={12} stroke={2.5} style={{color:'rgba(255,255,255,.7)'}}/></div>{f}</div>))}
        </div>
      </div>
    </div>
    <div className="lr">
      <div className="lform">
        <div style={{marginBottom:30}}><div style={{fontSize:24,fontWeight:700,letterSpacing:'-.04em'}}>Entrar</div><div style={{fontSize:14,color:'var(--ink3)',marginTop:5}}>Acesse sua conta para continuar</div></div>
        {err&&<div className="lerr">{err}</div>}
        <div className="lfield"><label className="llbl">Email</label><input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="seu@email.com"/></div>
        <div className="lfield"><label className="llbl">Senha</label><input className="inp" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="••••••••"/></div>
        <button className="btn pr" style={{width:'100%',padding:'12px',marginTop:6,fontSize:14,justifyContent:'center'}} onClick={submit} disabled={loading}>{loading?<><Spin/>Entrando...</>:'Entrar'}</button>
        <div style={{marginTop:18,padding:'11px 14px',background:'var(--sf2)',border:'1px solid var(--bd)',borderRadius:'var(--r)',fontSize:13,color:'var(--ink3)'}}><strong style={{color:'var(--ink)'}}>Demo:</strong> demo@contabil.app / demo123</div>
      </div>
    </div>
  </div>);
};

const Dashboard=({go})=>{
  const [stats,setStats]=useState(null);
  const [txs,setTxs]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    Promise.all([api.get('/api/dashboard/stats?period=2026-11'),api.get('/api/transactions?period=2026-11&limit=6')])
    .then(([s,t])=>{setStats(s);setTxs(t.transactions||[]);}).catch(console.error).finally(()=>setLoading(false));
  },[]);

    catch(e){alert('Erro: '+e.message);}finally{setUploading(false);}

const Chat=()=>{
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState('');
  const [sending,setSending]=useState(false);
  const ref=useRef();
  useEffect(()=>{api.get('/api/chat').then(d=>setMsgs(d.messages||[])).catch(console.error);},[]);
  useEffect(()=>{if(ref.current) ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);
  const send=async text=>{
    const m=text||input.trim();if(!m||sending)return;
    setInput('');setSending(true);
    setMsgs(p=>[...p,{id:Date.now(),role:'user',content:m}]);
    try{const d=await api.post('/api/chat',{message:m});setMsgs(p=>[...p,d.message]);}
    catch(e){setMsgs(p=>[...p,{id:Date.now()+1,role:'assistant',content:'Erro: '+e.message}]);}
    finally{setSending(false);}
  };
  const suggs=['Resumo do periodo','Quais sao os riscos?','Mostrar divergencias','Saldo das contas'];
  return(<div className="chat-layout">
    <div style={{padding:'18px 28px 0',borderBottom:'1px solid var(--bd)',background:'var(--sf)',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:12,paddingBottom:14}}>
        <div className="agav" style={{width:40,height:40,fontSize:12}}>AI</div>
        <div><div style={{fontWeight:700,fontSize:15,letterSpacing:'-.03em'}}>Agente Contabil</div><div style={{fontSize:12,color:'var(--ok)',fontWeight:500,display:'flex',alignItems:'center',gap:5,marginTop:2}}><span className="dot dok" style={{width:5,height:5}}/>online</div></div>
        <button className="btn sm gh" style={{marginLeft:'auto'}} onClick={async()=>{await api.del('/api/chat');setMsgs([]);}}><I.x size={13}/>Limpar</button>
      </div>
    </div>
    <div ref={ref} className="chat-msgs">
      {msgs.length===0&&(<div style={{textAlign:'center',padding:'50px 20px',color:'var(--ink3)'}}><div style={{fontSize:36,marginBottom:12}}>🤖</div><div style={{fontSize:16,fontWeight:600,color:'var(--ink)',marginBottom:6}}>Ola! Sou o Agente Contabil</div><div style={{fontSize:14,lineHeight:1.65}}>Posso ajudar com analise de transacoes, alertas de risco, saldos e relatorios.</div><div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',marginTop:24}}>{suggs.map(s=><button key={s} className="btn sm" onClick={()=>send(s)}>{s}</button>)}</div></div>)}
      {msgs.map((m,i)=>(<div key={m.id||i} className="fup" style={{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start',gap:6}}>
        <div className={`mrow ${m.role==='user'?'me':''}`}>
          {m.role==='assistant'&&<div className="agav" style={{width:28,height:28,fontSize:10,flexShrink:0}}>AI</div>}
          <div className={`bubble ${m.role==='user'?'me':'ai'}`}>{m.content}</div>
        </div>
        {m.suggestions?.length>0&&(<div style={{display:'flex',flexWrap:'wrap',gap:6,paddingLeft:38}}>{m.suggestions.map(s=><button key={s} className="btn sm" onClick={()=>send(s)}>{s}</button>)}</div>)}
      </div>))}
      {sending&&(<div className="mrow"><div className="agav" style={{width:28,height:28,fontSize:10}}>AI</div><div className="bubble ai" style={{display:'flex',gap:4,alignItems:'center',padding:'12px 14px'}}><span className="pulse"/><span className="pulse"/><span className="pulse"/></div></div>)}
    </div>
    <div className="cbar">
      <input className="inp" style={{flex:1}} placeholder="Pergunte sobre transacoes, riscos, relatorios..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()} disabled={sending}/>
      <button className="btn pr" onClick={()=>send()} disabled={!input.trim()||sending}><I.send size={14}/>Enviar</button>
    </div>
  </div>);
};

        </div>
      </div>
    </>)}
  </div>);
};

const App=()=>{
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState('dashboard');
  const [na,setNa]=useState(0);
  const [checking,setChecking]=useState(!!localStorage.getItem('ct'));
  useEffect(()=>{
    if(!localStorage.getItem('ct')){setChecking(false);return;}
    api.get('/auth/me').then(setUser).catch(()=>{localStorage.removeItem('ct');api.token=null;}).finally(()=>setChecking(false));
  },[]);
  useEffect(()=>{if(!user)return;api.get('/api/alerts?resolved=false').then(d=>setNa(d.alerts?.length||0)).catch(()=>{});},[user]);
  const logout=()=>{localStorage.removeItem('ct');api.token=null;setUser(null);};
  if(checking) return <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><Spin/></div>;
  if(!user) return <Login onLogin={setUser}/>;
  const pages={dashboard:<Dashboard go={setScreen}/>,transactions:<Transactions/>,alerts:<Alerts/>,upload:<Upload/>,chat:<Chat/>,report:<Report/>};
  return(<div className="layout">
    <Sidebar cur={screen} go={setScreen} user={user} logout={logout} na={na}/>
    <div className="main">
      <MH cur={screen}/>
      <div className="mscroll">{pages[screen]||pages.dashboard}</div>
      <MTabs cur={screen} go={setScreen} na={na}/>
    </div>
  </div>);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
